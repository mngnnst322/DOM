<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="cal.css" />
  </head>
  <body>
    <div class="phone">
      <div class="input-sec">
        <input type="text" class="input" id="input" />
      </div>
      <div class="btn-sec">
        <div class="btn gray" id="clear">
          <img
            src="backspace_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg"
            class="img"
          />
        </div>
        <div class="btn gray" id="bracke">C</div>
        <div class="btn gray" id="percentage">%</div>
        <div class="btn lightgrey" id="divide">/</div>
        <div class="btn" id="seven">7</div>
        <div class="btn" id="eight">8</div>
        <div class="btn" id="nine">9</div>
        <div class="btn lightgrey" id="times">*</div>
        <div class="btn" id="four">4</div>
        <div class="btn" id="five">5</div>
        <div class="btn" id="six">6</div>
        <div class="btn lightgrey" id="minus">-</div>
        <div class="btn" id="one">1</div>
        <div class="btn" id="two">2</div>
        <div class="btn" id="three">3</div>
        <div class="btn lightgrey" id="plus">+</div>
        <div class="btn" id="minush">(-)</div>
        <div class="btn" id="zero">0</div>
        <div class="btn" id="dot">.</div>
        <div class="btn lightgrey" id="equal">=</div>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
